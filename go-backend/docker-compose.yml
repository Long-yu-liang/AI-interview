services:
  # 1. Redis服务
  redis:
    image: redis:alpine
    expose:
      - "6379"
    networks:
      - ai-agent-network
    healthcheck:
      test: [ "CMD", "redis-cli", "ping" ]
      interval: 10s
      timeout: 5s
      retries: 5

  # 2. PostgreSQL数据库
  postgres:
    image: ankane/pgvector
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    expose:
      - "5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
      - ./init-db:/docker-entrypoint-initdb.d
    networks:
      - ai-agent-network
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}" ]
      interval: 10s
      timeout: 5s
      retries: 5

  # 3. API服务 (内置 DocProcessor MCP Tool)
  api:
    build:
      context: .
      dockerfile: api/Dockerfile
    ports:
      - "8123:8123"
    depends_on:
      redis:
        condition: service_healthy
      postgres:
        condition: service_healthy
    networks:
      - ai-agent-network
    environment:
      GO111MODULE: "on"
      GOPROXY: "https://goproxy.cn,direct"
      OPENAI_API_KEY: ${OPENAI_API_KEY}
      OPENAI_BASE_URL: ${OPENAI_BASE_URL}
      OPENAI_MODEL: ${OPENAI_MODEL}
      OPENAI_MAX_TOKENS: ${OPENAI_MAX_TOKENS}
      OPENAI_TEMPERATURE: ${OPENAI_TEMPERATURE}
      VECTOR_DB_HOST: ${VECTOR_DB_HOST}
      VECTOR_DB_PORT: ${VECTOR_DB_PORT}
      VECTOR_DB_NAME: ${VECTOR_DB_NAME}
      VECTOR_DB_USER: ${VECTOR_DB_USER}
      VECTOR_DB_PASSWORD: ${VECTOR_DB_PASSWORD}
      VECTOR_DB_TABLE: ${VECTOR_DB_TABLE}
      VECTOR_DB_MAX_CONN: ${VECTOR_DB_MAX_CONN}
      VECTOR_DB_EMBEDDING_MODEL: ${VECTOR_DB_EMBEDDING_MODEL}
      VECTOR_DB_KNOWLEDGE_MAX_CHUNK_SIZE: ${VECTOR_DB_KNOWLEDGE_MAX_CHUNK_SIZE}
      VECTOR_DB_KNOWLEDGE_TOP_K: ${VECTOR_DB_KNOWLEDGE_TOP_K}
      VECTOR_DB_KNOWLEDGE_MAX_CONTEXT_LENGTH: ${VECTOR_DB_KNOWLEDGE_MAX_CONTEXT_LENGTH}
      MCP_ENDPOINT: ${MCP_ENDPOINT}
      REDIS_HOST: ${REDIS_HOST}
      REDIS_PORT: ${REDIS_PORT}
      REDIS_PASSWORD: ${REDIS_PASSWORD}
      REDIS_DB: ${REDIS_DB}

  # 4. 前端服务
  frontend:
    build:
      context: ../vue-frontend
      dockerfile: Dockerfile
    ports:
      - "80:80"
    depends_on:
      api:
        condition: service_started
    networks:
      - ai-agent-network

# 网络定义
networks:
  ai-agent-network:
    driver: bridge
    name: ai-agent-network

# 数据卷定义
volumes:
  postgres-data:
