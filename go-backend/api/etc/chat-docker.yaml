#本文件供远程部署使用
Name: chat
Host: 0.0.0.0
Port: 8123
Timeout: 0

OpenAI:
  ApiKey: "${OPENAI_API_KEY}"
  BaseURL: "${OPENAI_BASE_URL}"
  Model: "${OPENAI_MODEL}"
  MaxTokens: ${OPENAI_MAX_TOKENS}
  Temperature: ${OPENAI_TEMPERATURE}

VectorDB:
  Host: "${VECTOR_DB_HOST}"  # 使用Docker服务名
  Port: ${VECTOR_DB_PORT}
  DBName: "${VECTOR_DB_NAME}"
  User: "${VECTOR_DB_USER}"
  Password: "${VECTOR_DB_PASSWORD}"
  Table: "${VECTOR_DB_TABLE}"
  MaxConn: ${VECTOR_DB_MAX_CONN}
  EmbeddingModel: "${VECTOR_DB_EMBEDDING_MODEL}"
  Knowledge:
    MaxChunkSize: ${VECTOR_DB_KNOWLEDGE_MAX_CHUNK_SIZE}
    TopK: ${VECTOR_DB_KNOWLEDGE_TOP_K}
    MaxContextLength: ${VECTOR_DB_KNOWLEDGE_MAX_CONTEXT_LENGTH}

MCP:
  Endpoint: "${MCP_ENDPOINT}"  # Docker内的二进制路径

Redis:
  Host: "${REDIS_HOST}"  # 使用Docker服务名
  Port: ${REDIS_PORT}
  Password: "${REDIS_PASSWORD}"
  DB: ${REDIS_DB}
